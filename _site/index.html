<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Name | Your Website Description</title> <!-- Fill in your name and website description -->
  <!-- Add other meta tags and SEO elements here -->

  <link rel="stylesheet" href="/assets/main.css"> <!-- Link to your CSS file -->
</head>
<body>
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a class="site-title" rel="author" href="/">Your Name</a> <!-- Fill in your name -->
      <nav class="site-nav">
        <!-- Add navigation links here -->
      </nav>
    </div>
  </header>

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      <article class="post">
        <header class="post-header">
          <h1 class="post-title">Your Page Title</h1> <!-- Fill in your page title -->
        </header>
        <div class "post-content">
          <!-- Your content goes here -->
          <!-- Customize and add your content as needed -->
        </div>
      </article>
    </div>
  </main>

  <footer class="site-footer h-card">
    <data class="u-url" href="/"></data>
    <div class="wrapper">
      <div class="footer-col-wrapper">
        <div class="footer-col footer-col-1">
          <p>Your Website Description</p> <!-- Fill in your website description -->
        </div>
        <div class="footer-col footer-col-2">
          <!-- Add contact information or links here -->
        </div>
        <div class="footer-col footer-col-3">
          <ul class="social-media-list">
            <li>
              <a href="https://github.com/yourusername">
                <!-- Add your GitHub icon and link -->
                <svg class="svg-icon"><use xlink:href="/assets/minima-social-icons.svg#github"></use></svg>
                <span class="username">yourusername</span>
              </a>
            </li>
            <li>
              <a href="https://www.twitter.com/yourusername">
                <!-- Add your Twitter icon and link -->
                <svg class="svg-icon"><use xlink:href="/assets/minima-social-icons.svg#twitter"></use></svg>
                <span class="username">yourusername</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
